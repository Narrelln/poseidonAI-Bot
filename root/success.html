<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome – Poseidon AI</title>
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    body {
      background: linear-gradient(120deg, #060b13 0%, #10131a 100%);
      min-height: 100vh;
      margin: 0;
      color: #e3f6fb;
      font-family: 'Orbitron', 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .success-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      margin-top: 36px;
      width: 100%;
    }
    .robot-float-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      position: relative;
      width: 110px;
      height: 110px;
    }
    .sentient-glow {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 115px; height: 115px;
      border-radius: 50%;
      background: conic-gradient(#00ffe6, #5c4cff, #ff0fe6, #2aff00, #ffd700, #00ffe6);
      filter: blur(18px) brightness(1.0) saturate(1.4);
      opacity: 0.55;
      z-index: 1;
      animation: colorShift 6s linear infinite;
      pointer-events: none;
    }
    .poseidon-bot {
      width: 90px; height: 90px;
      filter: drop-shadow(0 4px 24px #13e6ffb2);
      animation: floatbot 2.7s ease-in-out infinite alternate;
      position: absolute;
      left: 50%; top: 15px;
      transform: translateX(-50%);
      z-index: 3;
    }
    .bot-eyes {
      position: absolute;
      left: 50%; top: 51%;
      width: 36px; height: 13px;
      transform: translate(-50%, -50%);
      display: flex; justify-content: space-between;
      z-index: 6;
      pointer-events: none;
    }
    .bot-eye {
      width: 11px; height: 11px;
      background: radial-gradient(circle, #00fffa 60%, #1ec3ff 90%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 18px #0ef6ffb9, 0 0 7px #00fff9cc;
      animation: eyePulse 2.1s infinite alternate, eyeBlink 8s infinite;
      opacity: 1;
      transition: filter 0.12s;
    }
    .bot-eye.right { animation-delay: 0.2s, 4.2s; }
    .bot-eye.left  { animation-delay: 0s, 0s; }
    @keyframes floatbot {
      0% { transform: translateX(-50%) translateY(0);}
      50% { transform: translateX(-50%) translateY(-7px) scale(1.01);}
      100% { transform: translateX(-50%) translateY(0);}
    }
    @keyframes colorShift {
      0% { filter: blur(18px) brightness(1.0) saturate(1.4); opacity: 0.55;}
      30% { filter: blur(22px) brightness(1.1) saturate(1.7); opacity: 0.7;}
      60% { filter: blur(14px) brightness(0.95) saturate(1.1); opacity: 0.63;}
      100% { filter: blur(18px) brightness(1.0) saturate(1.4); opacity: 0.55;}
    }
    @keyframes eyePulse {
      0% { filter: brightness(1.1) blur(0px);}
      80% { filter: brightness(1.7) blur(2px);}
      100% { filter: brightness(1.2) blur(0px);}
    }
    @keyframes eyeBlink {
      0%, 92%, 100% { transform: scaleY(1);}
      94%, 96% { transform: scaleY(0.17);}
    }
    .success-message {
      background: linear-gradient(120deg, #11202be0 40%, #193a40e9 100%);
      border-radius: 18px;
      box-shadow: 0 0 18px #00e7ff32;
      padding: 38px 32px 30px 32px;
      margin-top: 15px;
      max-width: 370px;
      width: 94vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      text-align: center;
      font-size: 1.13em;
      color: #d8ffff;
    }
    .success-message h2 {
      color: #1dfaff;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.5em;
      font-family: 'Orbitron', Arial, sans-serif;
      text-shadow: 0 2px 18px #00e7ff3c;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .success-actions {
      margin-top: 30px;
      display: flex;
      gap: 16px;
      justify-content: center;
      width: 100%;
    }
    .success-actions a {
      background: linear-gradient(90deg, #18b1f6, #29ffcb 90%);
      color: #082228;
      font-weight: bold;
      border: none;
      border-radius: 28px;
      padding: 12px 38px;
      font-size: 1.1em;
      letter-spacing: 0.7px;
      box-shadow: 0 2px 12px #00e7ff3a;
      text-decoration: none;
      transition: background 0.18s, color 0.13s, transform 0.11s;
      animation: pulseBtn 2.3s infinite alternate;
      display: inline-block;
    }
    .success-actions a:hover {
      background: linear-gradient(90deg, #29ffcb, #18b1f6 90%);
      color: #031c24;
      transform: scale(1.04);
      animation-play-state: paused;
    }
    @keyframes pulseBtn {
      0% { box-shadow: 0 2px 14px #18fff788; }
      100% { box-shadow: 0 6px 28px #17fffc66, 0 0 12px #26f3e940; }
    }
    @media (max-width: 650px) {
      .success-message { padding: 22px 7vw 20px 7vw; }
      .robot-float-container { width: 80px; height: 80px;}
      .poseidon-bot { width: 62px; height: 62px;}
      .bot-eyes { width: 20px; height: 7px;}
    }
  </style>
</head>
<body>
  <div class="success-hero">
    <div class="robot-float-container">
      <div class="sentient-glow"></div>
      <img src="assets/robot.png" alt="Poseidon AI Bot" class="poseidon-bot" />
      <div class="bot-eyes">
        <div class="bot-eye left"></div>
        <div class="bot-eye right"></div>
      </div>
    </div>
    <div class="success-message">
      <h2>Access Activated!</h2>
      <div>
        Welcome to Poseidon AI.<br>
        Your account is now active.<br>
        <span style="color:#5cfde0;">Dive in and start trading like a legend.</span>
      </div>
      <div class="success-actions">
        <a href="dashboard.html">Go to Dashboard</a>
        <a href="index.html" style="background:#173d4b;color:#1de5e5;">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
